<body>
  <!--
    Privacy Policy
    - This app is primarily a native iOS/Android app.
    - We include a static privacy policy here for GitHub Pages hosting.
    - For a standalone page, open /privacy.html (also included in /web).
  -->
  <noscript>
    <main style="max-width: 900px; margin: 40px auto; padding: 0 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.55;">
      <h1>Privacy Policy</h1>
      <p><strong>AI Trading Agent</strong> ("we", "our", or "us") respects your privacy. This Privacy Policy explains how the app handles information.</p>

      <h2>Summary</h2>
      <ul>
        <li>We process chart screenshots you choose to upload for analysis.</li>
        <li>We may send extracted text (OCR) and analysis prompts to our AI provider to generate results.</li>
        <li>We do not sell your personal data.</li>
        <li>Analysis history may be stored locally on your device.</li>
      </ul>

      <h2>Information You Provide</h2>
      <ul>
        <li><strong>Chart images</strong>: screenshots/photos you select from your gallery or camera.</li>
        <li><strong>Text extracted from images (OCR)</strong>: the app may extract visible text (e.g., symbol, timeframe, levels) from the chart image.</li>
      </ul>

      <h2>How We Use Information</h2>
      <ul>
        <li>To generate an AI trading analysis and display it to you.</li>
        <li>To show and manage your on-device analysis history.</li>
        <li>To support app features like sharing a result card.</li>
      </ul>

      <h2>AI Processing</h2>
      <p>When you request an analysis, the app may send the extracted text and prompt content to an AI service provider to generate the response. The content sent is used to produce your result.</p>

      <h2>Data Storage</h2>
      <ul>
        <li><strong>On-device</strong>: the app may store recent analysis results on your device so you can revisit them quickly.</li>
        <li><strong>Remote</strong>: the app may retrieve configuration required to run the service (for example, API configuration) from our backend.</li>
      </ul>

      <h2>Sharing</h2>
      <p>If you choose to share a result, the app uses the system share sheet to send content to apps you select (e.g., Messages, WhatsApp). What happens after sharing depends on the recipient app’s policies.</p>

      <h2>Subscriptions & Purchases</h2>
      <p>Subscriptions are handled by Apple/Google through their in-app purchase systems. We do not collect or store your payment card details.</p>

      <h2>Children’s Privacy</h2>
      <p>The app is not intended for children under 13. We do not knowingly collect personal information from children.</p>

      <h2>Security</h2>
      <p>We take reasonable steps to protect information processed by the app. No method of transmission or storage is 100% secure.</p>

      <h2>Changes</h2>
      <p>We may update this Privacy Policy from time to time. The latest version will be posted at this URL.</p>

      <h2>Contact</h2>
      <p>If you have questions, contact us at: <strong>support@aitradingagent.app</strong></p>

      <p style="margin-top: 28px; font-size: 12px; opacity: 0.75;">Last updated: 2026-05-06</p>
      <p style="margin-top: 10px;"><a href="privacy.html">Open dedicated privacy policy page</a></p>
    </main>
  </noscript>

  <script src="flutter_bootstrap.js" async></script>
